version: "1"

secrets:
  - name: docker_username
    key: zapplebee/nyx-auth/docker_username
    engine: native
    type: repo
  - name: docker_password
    key: zapplebee/nyx-auth/docker_password
    engine: native
    type: repo
  - name: minio_access_key
    key: zapplebee/nyx-auth/minio_access_key
    engine: native
    type: repo
  - name: minio_secret_key
    key: zapplebee/nyx-auth/minio_secret_key
    engine: native
    type: repo

# nyx-auth is fully stateless — no database, no migration step.
# Users and clients are driven by config files loaded at startup.
services:
  - name: nyx-auth
    image: oven/bun:1.3.5
    pull: always
    entrypoint:
      - /bin/sh
      - -c
      - "until [ -f ${VELA_WORKSPACE}/package.json ]; do sleep 1; done && cd ${VELA_WORKSPACE} && bun install --frozen-lockfile && bun src/index.ts"
    environment:
      BETTER_AUTH_SECRET: ci-test-secret-nyx-auth-do-not-use-in-prod
      BETTER_AUTH_URL: http://nyx-auth:3000
      TRUSTED_ORIGINS: http://test-app:5173
      CLIENTS_CONFIG: ./clients.ci.yml
      USERS_CONFIG: ./users.ci.yml
      PORT: "3000"

  - name: test-app
    image: node:20-alpine
    pull: always
    entrypoint:
      - /bin/sh
      - -c
      - "until [ -d ${VELA_WORKSPACE}/test-app ]; do sleep 1; done && cd ${VELA_WORKSPACE}/test-app && npm install && npx vite --host 0.0.0.0 --port 5173"
    environment:
      VITE_AUTH_URL: http://nyx-auth:3000/api/auth
      VITE_CLIENT_ID: ci-test
      VITE_REDIRECT_URI: http://test-app:5173/callback

steps:
  - name: wait-for-services
    image: alpine:latest
    pull: always
    commands:
      - apk add --no-cache curl
      - echo "Waiting for nyx-auth..."
      - for i in $(seq 1 90); do curl -sf http://nyx-auth:3000/ && echo "nyx-auth ready" && break; [ $i -eq 90 ] && echo "nyx-auth never ready" && exit 1; sleep 2; done
      - echo "Waiting for test-app..."
      - for i in $(seq 1 90); do curl -sf http://test-app:5173/ && echo "test-app ready" && break; [ $i -eq 90 ] && echo "test-app never ready" && exit 1; sleep 2; done

  - name: unit-test
    image: oven/bun:1.3.5
    pull: always
    commands:
      - cd ${VELA_WORKSPACE} && bun install --frozen-lockfile && bun test:coverage

  - name: cypress
    image: cypress/included:latest
    pull: always
    environment:
      CYPRESS_BASE_URL: http://test-app:5173
      CYPRESS_AUTH_URL: http://nyx-auth:3000
      CYPRESS_CI_EMAIL: ci@nyx.test
      CYPRESS_CI_PASSWORD: TestPass1234!
      CYPRESS_CI_OTP_SECRET: 5YIEQ5DAA6AGQMWT4X3LESW6FZYT4E2M
    commands:
      - cd test-app && cypress run --browser chrome

  - name: upload-artifacts
    image: alpine:latest
    pull: always
    ruleset:
      status: [success, failure]
    secrets: [minio_access_key, minio_secret_key]
    commands:
      - apk add --no-cache curl
      - curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc && chmod +x /usr/local/bin/mc
      - mc alias set minio http://172.17.0.1:9000 "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
      - mc mb --ignore-existing minio/cypress-videos
      - mc anonymous set download minio/cypress-videos
      - mc cp --recursive "${VELA_WORKSPACE}/test-app/cypress/videos/" "minio/cypress-videos/${VELA_BUILD_NUMBER}/videos/" || echo "no videos to upload"
      - mc cp --recursive "${VELA_WORKSPACE}/test-app/cypress/screenshots/" "minio/cypress-videos/${VELA_BUILD_NUMBER}/screenshots/" || echo "no screenshots to upload"
      - |
        echo "=== Artifact download links ==="
        mc ls --recursive "minio/cypress-videos/${VELA_BUILD_NUMBER}/" | awk -v build="${VELA_BUILD_NUMBER}" '{print "  https://bucket.prettybird.zapplebee.online/cypress-videos/" build "/" $NF}'
        echo "=== Console ==="
        echo "  https://minio.prettybird.zapplebee.online/browser/cypress-videos/${VELA_BUILD_NUMBER}/"

  - name: publish-push
    ruleset:
      event: push
      branch: main
    image: target/vela-docker:latest
    pull: always
    secrets: [docker_username, docker_password]
    parameters:
      registry: harbor.prettybird.zapplebee.online
      repo: harbor.prettybird.zapplebee.online/library/nyx-auth
      tags:
        - harbor.prettybird.zapplebee.online/library/nyx-auth:latest
        - harbor.prettybird.zapplebee.online/library/nyx-auth:${VELA_BUILD_COMMIT:0:8}

  - name: publish-tag
    ruleset:
      event: tag
    image: target/vela-docker:latest
    pull: always
    secrets: [docker_username, docker_password]
    parameters:
      registry: harbor.prettybird.zapplebee.online
      repo: harbor.prettybird.zapplebee.online/library/nyx-auth
      tags:
        - harbor.prettybird.zapplebee.online/library/nyx-auth:${VELA_BUILD_TAG}
